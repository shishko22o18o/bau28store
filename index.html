<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau28Store · Магазин в Telegram</title>
    <style>
        :root {
            --bg-color: #0d0914;
            --primary: #b829ff;
            --primary-glow: rgba(184, 41, 255, 0.4);
            --secondary: #8a2be2;
            --surface: rgba(25, 18, 35, 0.6);
            --surface-border: rgba(184, 41, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a097b0;
            --danger: #ff4444;
            --heart: #ff4081;
            --success: #4caf50;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .bg-custom {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('images/fon.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar { display: none; }
        
        .app {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 90px; /* отступ под хотбар */
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .logo img {
            max-height: 60px;
            width: auto;
            border-radius: 12px;
            box-shadow: 0 0 10px #b829ff, 0 0 20px #b829ff, 0 0 30px #b829ff;
            animation: neonPulse 2s infinite ease-in-out;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #b829ff, 0 0 10px #b829ff, 0 0 15px #b829ff; }
            50% { box-shadow: 0 0 15px #b829ff, 0 0 25px #b829ff, 0 0 35px #b829ff; }
            100% { box-shadow: 0 0 5px #b829ff, 0 0 10px #b829ff, 0 0 15px #b829ff; }
        }

        .header-gif {
            cursor: pointer;
        }
        .header-gif img {
            max-height: 40px;
            width: auto;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .header-gif img:hover {
            transform: scale(1.1);
        }

        /* Анимации для кнопок */
        .btn-add, .btn-fav, .hotbar-btn, .pill, .cat-btn, .spin-btn-modern, .promo-btn-modern, .order-btn-modern, .close-btn {
            transition: all 0.2s ease;
        }
        .btn-add:hover, .btn-fav:hover, .hotbar-btn:hover, .pill:hover, .cat-btn:hover, .spin-btn-modern:hover, .promo-btn-modern:hover, .order-btn-modern:hover, .close-btn:hover {
            transform: scale(0.95);
            filter: brightness(1.2);
        }
        .btn-add:active, .btn-fav:active, .hotbar-btn:active, .pill:active, .cat-btn:active, .spin-btn-modern:active, .promo-btn-modern:active, .order-btn-modern:active, .close-btn:active {
            transform: scale(0.9);
            filter: brightness(1.4);
        }

        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 10px;
        }

        .cat-btn {
            flex: 0 0 110px;
            scroll-snap-align: start;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1/1.2;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
        }

        .cat-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        .cat-btn span {
            position: relative;
            z-index: 2;
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
        }

        .cat-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-3px);
        }

        .cat-btn[data-cat="clothes"] { background-image: url('images/cat_odezhda.jpg'); }
        .cat-btn[data-cat="accessories"] { background-image: url('images/cat_aksessuary.jpg'); }
        .cat-btn[data-cat="vape"] { background-image: url('images/cat_vape.jpg'); }
        .cat-btn[data-cat="electronics"] { background-image: url('images/cat_elektronika.jpg'); }

        .pills-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--surface-border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:active { transform: scale(0.97); transition: transform 0.1s; }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: rgba(0,0,0,0.3);
            position: relative;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .discount-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
            color: var(--text-main);
        }

        .product-description {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            /* убираем ограничение по высоте, текст переносится */
            word-wrap: break-word;
        }

        .product-price {
            color: #dbb6ff;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            margin-right: 6px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .btn-add {
            flex-grow: 1;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: 700;
            font-size: 13px;
            padding: 10px;
            border-radius: 14px;
            cursor: pointer;
            min-width: 0;
        }
        .btn-add:active { transform: scale(0.95); }

        .btn-fav {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 38px; height: 38px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-fav:active { transform: scale(0.9); }

        /* Хотбар */
        .hotbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 15, 28, 0.9);
            backdrop-filter: blur(20px);
            border-top: 2px solid var(--primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            z-index: 150;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .hotbar-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
            min-width: 60px;
        }
        .hotbar-btn:active { transform: scale(0.9); }

        .hotbar-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .hotbar-label {
            font-size: 11px;
        }

        .hotbar-badge {
            position: absolute;
            top: -2px;
            right: -5px;
            background: var(--heart);
            color: white;
            font-size: 10px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            border: 1px solid var(--bg-color);
        }

        /* Модалки */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: #1a1122;
            border-radius: 32px 32px 0 0;
            border-top: 2px solid var(--primary);
            padding: 24px 20px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .close-btn:active { transform: scale(0.9); }

        .sheet-body {
            overflow-y: auto;
            flex-grow: 1;
        }

        .cart-item-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 1px solid var(--surface-border);
        }

        .cart-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-item-emoji {
            font-size: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
        }

        .cart-item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-modern {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 4px;
        }

        .qty-modern button {
            background: none;
            border: none;
            color: white;
            width: 30px; height: 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 18px;
        }
        .qty-modern button:active { background: rgba(255,255,255,0.1); }

        .qty-modern span {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-item-modern {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 36px; height: 36px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .remove-item-modern:active { background: rgba(255,255,255,0.1); }

        .promo-section-modern {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .promo-input-modern {
            flex: 2;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
        }

        .promo-btn-modern {
            background: var(--secondary);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .order-btn-modern {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(184, 41, 255, 0.4);
        }

        .wheel-container {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .wheel-canvas {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: conic-gradient(
                #ff6b6b 0deg 45deg,
                #feca57 45deg 90deg,
                #48dbfb 90deg 135deg,
                #1dd1a1 135deg 180deg,
                #f368e0 180deg 225deg,
                #ff9f43 225deg 270deg,
                #00d2d3 270deg 315deg,
                #5f27cd 315deg 360deg
            );
            margin: 0 auto 20px;
            position: relative;
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .wheel-pointer {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid gold;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .spin-btn-modern {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(184, 41, 255, 0.4);
        }

        .prize-result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }

        .notification {
            position: fixed;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 1000;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .notification.show { top: 20px; }

        /* Пасхалка */
        .easter-egg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: var(--primary);
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--primary);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .easter-egg.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="bg-custom"></div>

    <div class="app">
        <div class="header">
            <div class="logo">
                <img src="images/logo.jpg" alt="Bau28">
            </div> 
            <div class="header-gif" id="easterEggTrigger">
                <img src="https://i.pinimg.com/originals/29/3a/55/293a55a10b33f45c07ecea5420ec70a6.gif?nii=t" alt="animation">
            </div>
        </div>

        <div class="categories" id="categories">
            <div class="cat-btn active" data-cat="clothes"><span>Одежда</span></div>
            <div class="cat-btn" data-cat="accessories"><span>Аксессуары</span></div>
            <div class="cat-btn" data-cat="vape"><span>VAPE</span></div>
            <div class="cat-btn" data-cat="electronics"><span>Электроника</span></div>
        </div>

        <div class="pills-container" id="vapeSubcats" style="display: none;">
            <div class="pill active" data-sub="liquids">Жидкости</div>
            <div class="pill" data-sub="consumables">Расходники</div>
            <div class="pill" data-sub="disposable">Одноразки</div>
            <div class="pill" data-sub="pods">POD-системы</div>
        </div>

        <div class="pills-container" id="filters">
            <div class="pill active" data-filter="all">Все</div>
            <div class="pill" data-filter="sale">🔥 Скидки</div>
            <div class="pill" data-filter="new">Новинки</div>
            <div class="pill" data-filter="priceAsc">Сначала дешевле</div>
            <div class="pill" data-filter="priceDesc">Сначала дороже</div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Модалка корзины -->
    <div class="modal-overlay" id="cartModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🛒 Твоя корзина</span>
                <button class="close-btn" id="closeCartBtn">✕</button>
            </div>
            <div class="sheet-body" id="cartItems"></div>
            <div class="promo-section-modern">
                <input type="text" class="promo-input-modern" id="promoCode" placeholder="Промокод">
                <button class="promo-btn-modern" id="applyPromo">Применить</button>
            </div>
            <div id="promoMessage" style="color: #ffaa00; font-size: 13px; margin-bottom: 10px;"></div>
            <div class="summary-row" id="discountRow" style="display: none;">
                <span>Скидка:</span>
                <span id="discountAmount">0 ₽</span>
            </div>
            <div class="total-row">
                <span>Итого:</span>
                <span id="modalTotal">0 ₽</span>
            </div>
            <button class="order-btn-modern" id="orderBtn">Оформить заказ</button>
        </div>
    </div>

    <!-- Модалка избранного -->
    <div class="modal-overlay" id="favModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>❤️ Избранное</span>
                <button class="close-btn" id="closeFavBtn">✕</button>
            </div>
            <div class="sheet-body" id="favItems"></div>
        </div>
    </div>

    <!-- Модалка колеса фортуны -->
    <div class="modal-overlay" id="wheelModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🎁 Колесо фортуны</span>
                <button class="close-btn" id="closeWheelBtn">✕</button>
            </div>
            <div class="sheet-body">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-canvas" id="wheel"></div>
                    <input type="text" class="promo-input-modern" id="wheelPromoCode" placeholder="Введите промокод для колеса" style="margin-bottom: 15px;">
                    <button class="spin-btn-modern" id="spinWheel">Крутить</button>
                    <div class="prize-result" id="wheelResult"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка детального просмотра товара -->
    <div class="modal-overlay" id="productModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span id="modalProductTitle">Товар</span>
                <button class="close-btn" id="closeProductBtn">✕</button>
            </div>
            <div class="sheet-body">
                <div style="text-align: center;">
                    <img id="modalProductImage" src="" style="width: 100%; border-radius: 20px; max-height: 250px; object-fit: contain; background: #1a0a24;">
                    <p id="modalProductDescription" style="margin: 15px 0; color: var(--text-muted);"></p>
                    <div style="font-size: 24px; font-weight: 800; color: #dbb6ff;" id="modalProductPrice"></div>
                    <button class="btn-add" style="width: 100%; margin-top: 20px;" id="modalAddToCart">В корзину</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижний хот-бар -->
    <div class="hotbar" id="hotbar">
        <button class="hotbar-btn" id="hotbarCart">
            <span class="hotbar-icon">🛒</span>
            <span class="hotbar-label">Корзина</span>
            <span class="hotbar-badge" id="hotbarCartBadge">0</span>
        </button>
        <button class="hotbar-btn" id="hotbarFav">
            <span class="hotbar-icon">❤️</span>
            <span class="hotbar-label">Избранное</span>
            <span class="hotbar-badge" id="hotbarFavBadge">0</span>
        </button>
        <button class="hotbar-btn" id="hotbarWheel">
            <span class="hotbar-icon">🎁</span>
            <span class="hotbar-label">Колесо</span>
        </button>
    </div>

    <!-- Пасхалка -->
    <div class="easter-egg" id="easterEggMessage">привет брат</div>

    <div class="notification" id="notification">✅ Добавлено</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ⚠️ ЗАМЕНИТЕ НА URL ВАШЕГО БОТА
            const API_BASE_URL = 'https://bot-production-cf41.up.railway.app';

            // Глобальные переменные
            let products = {};
            let currentCat = 'clothes';
            let currentSub = 'liquids';
            let currentFilter = 'all';
            let cart = JSON.parse(localStorage.getItem('bau28_cart') || '[]');
            let favorites = JSON.parse(localStorage.getItem('bau28_fav') || '[]');
            let appliedPromo = null;
            let wheelDiscount = 0;
            let wheelPrizes = [];
            let currentProduct = null;

            // DOM элементы (только существующие)
            const productsGrid = document.getElementById('productsGrid');
            const notif = document.getElementById('notification');
            const cartModal = document.getElementById('cartModal');
            const closeCartBtn = document.getElementById('closeCartBtn');
            const cartItemsDiv = document.getElementById('cartItems');
            const modalTotalSpan = document.getElementById('modalTotal');
            const orderBtn = document.getElementById('orderBtn');
            const promoInput = document.getElementById('promoCode');
            const applyPromoBtn = document.getElementById('applyPromo');
            const promoMessage = document.getElementById('promoMessage');
            const discountRow = document.getElementById('discountRow');
            const discountAmountSpan = document.getElementById('discountAmount');
            const wheelModal = document.getElementById('wheelModal');
            const closeWheelBtn = document.getElementById('closeWheelBtn');
            const spinBtn = document.getElementById('spinWheel');
            const wheelResultDiv = document.getElementById('wheelResult');
            const wheel = document.getElementById('wheel');
            const wheelPromoInput = document.getElementById('wheelPromoCode');
            const productModal = document.getElementById('productModal');
            const closeProductBtn = document.getElementById('closeProductBtn');
            const modalProductTitle = document.getElementById('modalProductTitle');
            const modalProductImage = document.getElementById('modalProductImage');
            const modalProductDescription = document.getElementById('modalProductDescription');
            const modalProductPrice = document.getElementById('modalProductPrice');
            const modalAddToCart = document.getElementById('modalAddToCart');
            const favModal = document.getElementById('favModal');
            const closeFavBtn = document.getElementById('closeFavBtn');
            const hotbarCart = document.getElementById('hotbarCart');
            const hotbarFav = document.getElementById('hotbarFav');
            const hotbarWheel = document.getElementById('hotbarWheel');
            const hotbarCartBadge = document.getElementById('hotbarCartBadge');
            const hotbarFavBadge = document.getElementById('hotbarFavBadge');
            const easterEggTrigger = document.getElementById('easterEggTrigger');
            const easterEggMessage = document.getElementById('easterEggMessage');

            // Вспомогательные
            const formatPrice = (p) => p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';

            function showNotification(text) {
                if (notif) {
                    notif.textContent = text;
                    notif.classList.add('show');
                    setTimeout(() => notif.classList.remove('show'), 2000);
                }
            }

            function findProduct(id) {
                for (let cat in products) {
                    if (cat === 'vape') {
                        for (let sub in products.vape) {
                            const found = products.vape[sub]?.find(p => p.id === id);
                            if (found) return found;
                        }
                    } else {
                        const found = products[cat]?.find(p => p.id === id);
                        if (found) return found;
                    }
                }
                return null;
            }

            // Загрузка товаров
            async function loadProducts() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/products`);
                    if (response.ok) {
                        products = await response.json();
                        renderProducts();
                    } else {
                        console.error('Ошибка загрузки товаров');
                        products = {};
                        renderProducts();
                    }
                } catch (e) {
                    console.error('Не удалось подключиться к серверу:', e);
                    products = {};
                    renderProducts();
                }
            }

            // Отрисовка каталога
            function renderProducts() {
                let items = currentCat === 'vape' ? (products.vape?.[currentSub] || []) : (products[currentCat] || []);

                if (currentFilter === 'sale') items = items.filter(p => p.discount && p.discount > 0);
                if (currentFilter === 'new') items = items.filter(p => p.isNew);
                if (currentFilter === 'priceAsc') items.sort((a,b) => (a.discount ? a.price*(1-a.discount/100) : a.price) - (b.discount ? b.price*(1-b.discount/100) : b.price));
                if (currentFilter === 'priceDesc') items.sort((a,b) => (b.discount ? b.price*(1-b.discount/100) : b.price) - (a.discount ? a.price*(1-a.discount/100) : a.price));

                if (items.length === 0) {
                    productsGrid.innerHTML = '<div style="grid-column: span 2; text-align:center; color:var(--text-muted); padding:40px;">Товары не найдены</div>';
                    return;
                }

                productsGrid.innerHTML = items.map(p => {
                    const finalPrice = p.discount ? Math.round(p.price * (1 - p.discount/100)) : p.price;
                    const isFav = favorites.includes(p.id);
                    return `
                        <div class="product-card" data-id="${p.id}">
                            <div class="product-img">
                                ${p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                                <img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:40px;\\'>📦</div>';">
                            </div>
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div class="product-description">${p.description || ''}</div>
                                <div class="product-price">
                                    ${p.discount ? `<span class="old-price">${formatPrice(p.price)}</span>` : ''}
                                    ${formatPrice(finalPrice)}
                                </div>
                                <div class="product-actions">
                                    <button class="btn-add" data-id="${p.id}">В корзину</button>
                                    <button class="btn-fav" data-id="${p.id}">${isFav ? '❤️' : '🤍'}</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('button')) {
                            const id = card.dataset.id;
                            const product = findProduct(id);
                            if (product) openProductModal(product);
                        }
                    });
                });
                document.querySelectorAll('.btn-add[data-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const p = findProduct(id);
                        if (p) addToCart(p);
                    });
                });
                document.querySelectorAll('.btn-fav[data-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const p = findProduct(id);
                        if (p) {
                            toggleFavorite(p);
                            btn.textContent = favorites.includes(id) ? '❤️' : '🤍';
                        }
                    });
                });
            }

            function openProductModal(product) {
                currentProduct = product;
                modalProductTitle.textContent = product.name;
                modalProductImage.src = product.img;
                modalProductDescription.textContent = product.description || 'Описание отсутствует';
                const finalPrice = product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price;
                modalProductPrice.innerHTML = product.discount ? `<span class="old-price">${formatPrice(product.price)}</span> ${formatPrice(finalPrice)}` : formatPrice(finalPrice);
                productModal.classList.add('active');
            }

            modalAddToCart.addEventListener('click', () => {
                if (currentProduct) {
                    addToCart(currentProduct);
                    productModal.classList.remove('active');
                }
            });

            closeProductBtn.addEventListener('click', () => productModal.classList.remove('active'));
            productModal.addEventListener('click', (e) => {
                if (e.target === productModal) productModal.classList.remove('active');
            });

            // Корзина
            window.changeQty = function(id, delta) {
                const item = cart.find(i => i.id === id);
                if (item) {
                    item.quantity += delta;
                    if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                    updateCart();
                }
            };

            function addToCart(product, qty = 1) {
                const existing = cart.find(i => i.id === product.id);
                if (existing) {
                    existing.quantity += qty;
                } else {
                    cart.push({ 
                        id: product.id, 
                        name: product.name, 
                        price: product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price, 
                        quantity: qty 
                    });
                }
                updateCart();
                showNotification('✅ Добавлено в корзину');
            }

            function updateCart() {
                localStorage.setItem('bau28_cart', JSON.stringify(cart));
                let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                let promoDiscount = 0;
                if (appliedPromo && appliedPromo.type === 'discount') {
                    if (appliedPromo.discount_type === 'percent') {
                        promoDiscount = Math.round(subtotal * appliedPromo.discount / 100);
                    } else {
                        promoDiscount = appliedPromo.discount;
                    }
                }
                let total = subtotal - promoDiscount - wheelDiscount;
                if (total < 0) total = 0;

                const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
                if (hotbarCartBadge) hotbarCartBadge.textContent = totalItems;
                if (modalTotalSpan) modalTotalSpan.textContent = formatPrice(total);

                if (promoDiscount > 0 || wheelDiscount > 0) {
                    discountRow.style.display = 'flex';
                    discountAmountSpan.textContent = `-${formatPrice(promoDiscount + wheelDiscount)}`;
                } else {
                    discountRow.style.display = 'none';
                }

                renderCartItems();
            }

            function renderCartItems() {
                if (!cartItemsDiv) return;
                if (cart.length === 0) {
                    cartItemsDiv.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Корзина пуста</div>';
                    return;
                }
                cartItemsDiv.innerHTML = cart.map(item => `
                    <div class="cart-item-modern">
                        <div class="cart-item-left">
                            <span class="cart-item-emoji">🛍️</span>
                            <div class="cart-item-info">
                                <span class="cart-item-name">${item.name}</span>
                                <span class="cart-item-price">${formatPrice(item.price)}</span>
                            </div>
                        </div>
                        <div class="cart-item-right">
                            <div class="qty-modern">
                                <button onclick="changeQty('${item.id}', -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQty('${item.id}', 1)">+</button>
                            </div>
                            <button class="remove-item-modern" onclick="removeFromCart('${item.id}')">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            window.removeFromCart = function(id) {
                cart = cart.filter(i => i.id !== id);
                updateCart();
            };

            // Промокоды
            applyPromoBtn.addEventListener('click', async () => {
                const code = promoInput.value.trim().toUpperCase();
                if (!code) {
                    promoMessage.textContent = 'Введите код';
                    return;
                }
                promoMessage.textContent = 'Проверка...';
                try {
                    const response = await fetch(`${API_BASE_URL}/api/check_promo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await response.json();
                    if (data.valid) {
                        if (data.type === 'wheel') {
                            wheelPromoInput.value = code;
                            promoMessage.textContent = '✅ Промокод активирован! Теперь крутите колесо.';
                            wheelModal.classList.add('active');
                        } else {
                            appliedPromo = { 
                                code, 
                                discount: data.discount, 
                                type: 'discount', 
                                discount_type: data.discount_type 
                            };
                            promoMessage.textContent = `✅ Промокод применён: скидка ${data.discount}${data.discount_type === 'percent' ? '%' : '₽'}`;
                        }
                    } else {
                        appliedPromo = null;
                        promoMessage.textContent = data.error || 'Неверный код';
                    }
                } catch (e) {
                    appliedPromo = null;
                    promoMessage.textContent = 'Ошибка сервера';
                }
                updateCart();
            });

            // Колесо фортуны
            async function fetchWheelPrizes() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/wheel/prizes`);
                    if (response.ok) {
                        wheelPrizes = await response.json();
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить призы колеса');
                }
            }

            spinBtn.addEventListener('click', async () => {
                const code = wheelPromoInput.value.trim().toUpperCase();
                if (!code) {
                    wheelResultDiv.textContent = 'Введите промокод для колеса';
                    return;
                }
                try {
                    const resp = await fetch(`${API_BASE_URL}/api/check_promo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await resp.json();
                    if (!data.valid || data.type !== 'wheel') {
                        wheelResultDiv.textContent = 'Неверный промокод для колеса';
                        return;
                    }
                } catch (e) {
                    wheelResultDiv.textContent = 'Ошибка проверки промокода';
                    return;
                }

                if (wheelPrizes.length === 0) {
                    wheelResultDiv.textContent = 'Нет доступных призов';
                    return;
                }

                const rotations = 5 + Math.random() * 3;
                const degrees = rotations * 360 + Math.random() * 360;
                wheel.style.transform = `rotate(${degrees}deg)`;

                setTimeout(() => {
                    const totalWeight = wheelPrizes.reduce((s, p) => s + (p.probability || 1), 0);
                    let rand = Math.random() * totalWeight;
                    let selected = null;
                    for (let p of wheelPrizes) {
                        if (rand < (p.probability || 1)) {
                            selected = p;
                            break;
                        }
                        rand -= (p.probability || 1);
                    }
                    if (!selected) selected = wheelPrizes[0];

                    if (selected.type === 'percent') {
                        const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                        wheelDiscount = Math.round(subtotal * selected.value / 100);
                    } else if (selected.type === 'fixed') {
                        wheelDiscount = selected.value;
                    } else {
                        wheelDiscount = 0;
                    }

                    wheelResultDiv.innerHTML = `🎉 Ваш приз: ${selected.description}!`;
                    updateCart();
                }, 3000);
            });

            // Избранное
            function toggleFavorite(product) {
                const id = product.id;
                const index = favorites.indexOf(id);
                if (index === -1) {
                    favorites.push(id);
                } else {
                    favorites.splice(index, 1);
                }
                localStorage.setItem('bau28_fav', JSON.stringify(favorites));
                updateFavBadge();
                renderProducts();
            }

            function updateFavBadge() {
                if (hotbarFavBadge) hotbarFavBadge.textContent = favorites.length;
            }

            function renderFavItems() {
                const container = document.getElementById('favItems');
                if (!container) return;
                if (favorites.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Нет избранных</div>';
                    return;
                }

                let html = '';
                favorites.forEach(id => {
                    let product = null;
                    for (let cat in products) {
                        if (cat === 'vape') {
                            for (let sub in products.vape) {
                                const found = products.vape[sub]?.find(p => p.id === id);
                                if (found) {
                                    product = found;
                                    break;
                                }
                            }
                        } else {
                            const found = products[cat]?.find(p => p.id === id);
                            if (found) {
                                product = found;
                                break;
                            }
                        }
                        if (product) break;
                    }

                    if (!product) {
                        favorites = favorites.filter(fid => fid !== id);
                        localStorage.setItem('bau28_fav', JSON.stringify(favorites));
                        updateFavBadge();
                        return;
                    }

                    const price = product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price;
                    html += `
                        <div class="cart-item-modern">
                            <div class="cart-item-left">
                                <span class="cart-item-emoji">🛍️</span>
                                <div class="cart-item-info">
                                    <span class="cart-item-name">${product.name}</span>
                                    <span class="cart-item-price">${formatPrice(price)}</span>
                                </div>
                            </div>
                            <button class="btn-add" style="width:auto; padding:8px 16px;" data-id="${product.id}">В корзину</button>
                        </div>
                    `;
                });

                container.innerHTML = html;
                container.querySelectorAll('.btn-add').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const product = findProduct(id);
                        if (product) {
                            addToCart(product);
                        }
                    });
                });
            }

            // Отправка заказа
            orderBtn.addEventListener('click', async () => {
                if (cart.length === 0) return;

                const subtotal = cart.reduce((s,i) => s + i.price*i.quantity, 0);
                const promoDiscount = appliedPromo && appliedPromo.type === 'discount' ? 
                    (appliedPromo.discount_type === 'percent' ? Math.round(subtotal * appliedPromo.discount / 100) : appliedPromo.discount) : 0;
                const total = subtotal - promoDiscount - wheelDiscount;

                const orderData = {
                    items: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: item.price
                    })),
                    total: total,
                    promo: appliedPromo ? appliedPromo.code : undefined,
                    wheel_discount: wheelDiscount
                };

                const tg = window.Telegram?.WebApp;
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(orderData));
                } else {
                    alert('Тестовый режим. Заказ: ' + JSON.stringify(orderData));
                }

                if (API_BASE_URL) {
                    try {
                        await fetch(`${API_BASE_URL}/api/order`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderData)
                        });
                    } catch (error) {
                        console.error('Не удалось отправить заказ на сервер:', error);
                    }
                }

                cart = [];
                appliedPromo = null;
                wheelDiscount = 0;
                promoInput.value = '';
                promoMessage.textContent = '';
                updateCart();
                cartModal.classList.remove('active');
                showNotification('🚀 Заказ оформлен!');
            });

            // Модалки через хотбар
            hotbarCart.addEventListener('click', () => {
                renderCartItems();
                cartModal.classList.add('active');
            });

            hotbarFav.addEventListener('click', () => {
                renderFavItems();
                favModal.classList.add('active');
            });

            hotbarWheel.addEventListener('click', () => {
                wheelModal.classList.add('active');
                fetchWheelPrizes();
            });

            // Закрытие модалок
            closeCartBtn.addEventListener('click', () => cartModal.classList.remove('active'));
            closeFavBtn.addEventListener('click', () => favModal.classList.remove('active'));
            closeWheelBtn.addEventListener('click', () => wheelModal.classList.remove('active'));

            // Закрытие свайпом вниз
            const sheets = [cartModal, favModal, wheelModal, productModal];
            sheets.forEach(modal => {
                if (!modal) return;
                let startY = 0;
                const sheet = modal.querySelector('.bottom-sheet');
                if (!sheet) return;

                modal.addEventListener('touchstart', (e) => {
                    if (e.target === modal) return;
                    const touch = e.touches[0];
                    startY = touch.clientY;
                }, { passive: true });

                modal.addEventListener('touchmove', (e) => {
                    if (startY === 0) return;
                    const touch = e.touches[0];
                    const diff = touch.clientY - startY;
                    if (diff > 50) {
                        modal.classList.remove('active');
                        startY = 0;
                    }
                }, { passive: true });

                modal.addEventListener('touchend', () => {
                    startY = 0;
                });
            });

            // Закрытие по клику на оверлей
            [cartModal, favModal, wheelModal, productModal].forEach(modal => {
                if (!modal) return;
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });

            // Навигация по категориям
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = btn.dataset.cat;
                    const vapeSubcats = document.getElementById('vapeSubcats');
                    if (vapeSubcats) vapeSubcats.style.display = currentCat === 'vape' ? 'flex' : 'none';
                    if (currentCat === 'vape') currentSub = 'liquids';
                    renderProducts();
                });
            });

            document.querySelectorAll('.subcat').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.subcat').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.sub) currentSub = btn.dataset.sub;
                    renderProducts();
                });
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.filter) currentFilter = btn.dataset.filter;
                    renderProducts();
                });
            });

            // Пасхалка
            if (easterEggTrigger && easterEggMessage) {
                easterEggTrigger.addEventListener('click', () => {
                    easterEggMessage.classList.add('show');
                    setTimeout(() => {
                        easterEggMessage.classList.remove('show');
                    }, 3000);
                });
            }

            // Инициализация
            (async () => {
                await loadProducts();
                updateCart();
                updateFavBadge();
            })();

            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.setHeaderColor('#0d0914');
            }
        });
    </script>
</body>
</html>

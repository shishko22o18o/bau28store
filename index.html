<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau28Store · Магазин в Telegram</title>
    <style>
        :root {
            --bg-color: #0d0914;
            --primary: #b829ff;
            --primary-glow: rgba(184, 41, 255, 0.4);
            --secondary: #8a2be2;
            --surface: rgba(25, 18, 35, 0.6);
            --surface-border: rgba(184, 41, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a097b0;
            --danger: #ff4444;
            --heart: #ff4081;
            --success: #4caf50;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .bg-custom {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('images/fon.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar { display: none; }
        
        .app {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 120px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header-gif {
    margin-left: auto;  /* прижмёт гифку к правому краю, если нужно */
    margin-right: 10px; /* отступ от кнопок */
}

        .header-gif img {
    max-height: 40px;   /* подберите размер под шапку */
    width: auto;
    border-radius: 8px;  /* можно скруглить, если нужно */
}
        .logo {
    /* если используете <img> с классом logo */
    max-width: 150px; /* или нужный размер */
    height: auto;
    display: inline-block;     
    border-radius: 12px;
    overflow: hidden; /* чтобы скругление обрезало содержимое */

}
.logo img {
    max-width: 100%;
    height: auto;
    max-height: 60px; /* ограничим высоту, чтобы не ломать шапку */
    object-fit: contain;
     
}
        }

        .top-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-btn {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            position: relative;
            transition: 0.2s ease;
            color: var(--text-main);
        }

        .top-btn:active { transform: scale(0.9); }

        .badge {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--heart);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }

        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 10px;
        }

        .cat-btn {
            flex: 0 0 110px;
            scroll-snap-align: start;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1/1.2;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            transition: 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
        }

        .cat-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        .cat-btn span {
            position: relative;
            z-index: 2;
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
        }

        .cat-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-3px);
        }

        .cat-btn[data-cat="clothes"] { background-image: url('images/cat_odezhda.jpg'); }
        .cat-btn[data-cat="accessories"] { background-image: url('images/cat_aksessuary.jpg'); }
        .cat-btn[data-cat="vape"] { background-image: url('images/cat_vape.jpg'); }
        .cat-btn[data-cat="electronics"] { background-image: url('images/cat_elektronika.jpg'); }

        .pills-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--surface-border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:active { transform: scale(0.97); }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: rgba(0,0,0,0.3);
            position: relative;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .discount-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
            color: var(--text-main);
        }

        .product-description {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            color: #dbb6ff;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            margin-right: 6px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .btn-add {
            flex-grow: 1;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: 700;
            font-size: 13px;
            padding: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:active { transform: scale(0.95); }

        .btn-fav {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 38px; height: 38px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-fav:active { transform: scale(0.9); }

        .cart-fixed {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: linear-gradient(135deg, #1a0f28 0%, #2d1a3a 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--primary);
            border-radius: 60px;
            padding: 10px 10px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(184, 41, 255, 0.3);
            transition: 0.3s ease;
        }

        .cart-fixed.hidden { transform: translate(-50%, 150%); }

        .cart-icon-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-icon-large {
            font-size: 32px;
            position: relative;
        }

        .cart-count-large {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--heart);
            color: white;
            font-size: 13px;
            font-weight: 800;
            min-width: 22px; height: 22px;
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--bg-color);
        }

        .cart-details {
            display: flex;
            flex-direction: column;
        }

        .cart-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .cart-total-large {
            font-weight: 800;
            font-size: 18px;
            color: #dbb6ff;
        }

        .checkout-btn-modern {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(184, 41, 255, 0.4);
            transition: 0.2s;
        }
        .checkout-btn-modern:active { transform: scale(0.95); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: #1a1122;
            border-radius: 32px 32px 0 0;
            border-top: 2px solid var(--primary);
            padding: 24px 20px 40px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .sheet-body {
            overflow-y: auto;
            flex-grow: 1;
        }

        .cart-item-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 1px solid var(--surface-border);
        }

        .cart-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-item-emoji {
            font-size: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
        }

        .cart-item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-modern {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 4px;
        }

        .qty-modern button {
            background: none;
            border: none;
            color: white;
            width: 30px; height: 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 18px;
        }
        .qty-modern button:active { background: rgba(255,255,255,0.1); }

        .qty-modern span {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-item-modern {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 36px; height: 36px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .remove-item-modern:active { background: rgba(255,255,255,0.1); }

        .promo-section-modern {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .promo-input-modern {
            flex: 2;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
        }

        .promo-btn-modern {
            background: var(--secondary);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .order-btn-modern {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(184, 41, 255, 0.4);
        }

        .wheel-container {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .wheel-canvas {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: conic-gradient(
                #ff6b6b 0deg 45deg,
                #feca57 45deg 90deg,
                #48dbfb 90deg 135deg,
                #1dd1a1 135deg 180deg,
                #f368e0 180deg 225deg,
                #ff9f43 225deg 270deg,
                #00d2d3 270deg 315deg,
                #5f27cd 315deg 360deg
            );
            margin: 0 auto 20px;
            position: relative;
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .wheel-pointer {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid gold;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .spin-btn-modern {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(184, 41, 255, 0.4);
        }

        .prize-result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }

        .notification {
            position: fixed;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 1000;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .notification.show { top: 20px; }
    </style>
</head>
<body>
    <div class="bg-custom"></div>

    <div class="app">
       <div class="header">
    <div class="logo">
        <img src="images/logo.jpg" alt="Bau28">
    </div>
    <div class="header-gif">
        <img src="https://i.pinimg.com/originals/0d/ac/06/0dac06a5332d13e2a4e2dc30ba0c6411.gif?nii=t" alt="animation">
    </div>
    <div class="top-actions">
         <button class="top-btn" id="wheelBtn">🎁</button>
        <button class="top-btn" id="topFavBtn">❤️<span class="badge" id="favBadge">0</span></button>
    </div>
</div>
   

        <div class="categories" id="categories">
            <div class="cat-btn active" data-cat="clothes"><span>Одежда</span></div>
            <div class="cat-btn" data-cat="accessories"><span>Аксессуары</span></div>
            <div class="cat-btn" data-cat="vape"><span>VAPE</span></div>
            <div class="cat-btn" data-cat="electronics"><span>Электроника</span></div>
        </div>

        <div class="pills-container" id="vapeSubcats" style="display: none;">
            <div class="pill active" data-sub="liquids">Жидкости</div>
            <div class="pill" data-sub="consumables">Расходники</div>
            <div class="pill" data-sub="disposable">Одноразки</div>
            <div class="pill" data-sub="pods">POD-системы</div>
        </div>

        <div class="pills-container" id="filters">
            <div class="pill active" data-filter="all">Все</div>
            <div class="pill" data-filter="sale">🔥 Скидки</div>
            <div class="pill" data-filter="new">Новинки</div>
            <div class="pill" data-filter="priceAsc">Сначала дешевле</div>
            <div class="pill" data-filter="priceDesc">Сначала дороже</div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="cart-fixed hidden" id="floatingCart">
        <div class="cart-icon-wrapper">
            <div class="cart-icon-large">🛒<span class="cart-count-large" id="cartCount">0</span></div>
            <div class="cart-details">
                <span class="cart-label">Корзина</span>
                <span class="cart-total-large" id="cartTotal">0 ₽</span>
            </div>
        </div>
        <button class="checkout-btn-modern" id="openCartBtn">Оформить</button>
    </div>

    <!-- Модалка корзины -->
    <div class="modal-overlay" id="cartModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🛒 Твоя корзина</span>
                <button class="close-btn" id="closeCartBtn">✕</button>
            </div>
            <div class="sheet-body" id="cartItems"></div>
            <div class="promo-section-modern">
                <input type="text" class="promo-input-modern" id="promoCode" placeholder="Промокод">
                <button class="promo-btn-modern" id="applyPromo">Применить</button>
            </div>
            <div id="promoMessage" style="color: #ffaa00; font-size: 13px; margin-bottom: 10px;"></div>
            <div class="summary-row" id="discountRow" style="display: none;">
                <span>Скидка:</span>
                <span id="discountAmount">0 ₽</span>
            </div>
            <div class="total-row">
                <span>Итого:</span>
                <span id="modalTotal">0 ₽</span>
            </div>
            <button class="order-btn-modern" id="orderBtn">Оформить заказ</button>
        </div>
    </div>

    <!-- Модалка избранного -->
    <div class="modal-overlay" id="favModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>❤️ Избранное</span>
                <button class="close-btn" id="closeFavBtn">✕</button>
            </div>
            <div class="sheet-body" id="favItems"></div>
        </div>
    </div>

    <!-- Модалка колеса фортуны -->
    <div class="modal-overlay" id="wheelModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🎁 Колесо фортуны</span>
                <button class="close-btn" id="closeWheelBtn">✕</button>
            </div>
            <div class="sheet-body">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-canvas" id="wheel"></div>
                    <input type="text" class="promo-input-modern" id="wheelPromoCode" placeholder="Введите промокод для колеса" style="margin-bottom: 15px;">
                    <button class="spin-btn-modern" id="spinWheel">Крутить</button>
                    <div class="prize-result" id="wheelResult"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка детального просмотра товара -->
    <div class="modal-overlay" id="productModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span id="modalProductTitle">Товар</span>
                <button class="close-btn" id="closeProductBtn">✕</button>
            </div>
            <div class="sheet-body">
                <div style="text-align: center;">
                    <img id="modalProductImage" src="" style="width: 100%; border-radius: 20px; max-height: 250px; object-fit: contain; background: #1a0a24;">
                    <p id="modalProductDescription" style="margin: 15px 0; color: var(--text-muted);"></p>
                    <div style="font-size: 24px; font-weight: 800; color: #dbb6ff;" id="modalProductPrice"></div>
                    <button class="btn-add" style="width: 100%; margin-top: 20px;" id="modalAddToCart">В корзину</button>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">✅ Добавлено</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==================== КОНФИГУРАЦИЯ ====================
            // ⚠️ ЗАМЕНИТЕ НА URL ВАШЕГО БОТА НА RAILWAY
            const API_BASE_URL = 'https://bot-production-cf41.up.railway.app';

            // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
            let products = {};
            let currentCat = 'clothes';
            let currentSub = 'liquids';
            let currentFilter = 'all';
            let cart = JSON.parse(localStorage.getItem('bau28_cart') || '[]');
            let favorites = JSON.parse(localStorage.getItem('bau28_fav') || '[]');
            let appliedPromo = null; // {code, discount, type, discount_type}
            let wheelDiscount = 0;
            let wheelPrizes = [];
            let currentProduct = null;

            // ==================== DOM ЭЛЕМЕНТЫ ====================
            const productsGrid = document.getElementById('productsGrid');
            const floatingCart = document.getElementById('floatingCart');
            const notif = document.getElementById('notification');
            const favBadge = document.getElementById('favBadge');
            const cartModal = document.getElementById('cartModal');
            const closeCartBtn = document.getElementById('closeCartBtn');
            const openCartBtn = document.getElementById('openCartBtn');
            const cartItemsDiv = document.getElementById('cartItems');
            const modalTotalSpan = document.getElementById('modalTotal');
            const cartCountSpan = document.getElementById('cartCount');
            const cartTotalSpan = document.getElementById('cartTotal');
            const orderBtn = document.getElementById('orderBtn');
            const promoInput = document.getElementById('promoCode');
            const applyPromoBtn = document.getElementById('applyPromo');
            const promoMessage = document.getElementById('promoMessage');
            const discountRow = document.getElementById('discountRow');
            const discountAmountSpan = document.getElementById('discountAmount');
            const wheelBtn = document.getElementById('wheelBtn');
            const wheelModal = document.getElementById('wheelModal');
            const closeWheelBtn = document.getElementById('closeWheelBtn');
            const spinBtn = document.getElementById('spinWheel');
            const wheelResultDiv = document.getElementById('wheelResult');
            const wheel = document.getElementById('wheel');
            const wheelPromoInput = document.getElementById('wheelPromoCode');
            const productModal = document.getElementById('productModal');
            const closeProductBtn = document.getElementById('closeProductBtn');
            const modalProductTitle = document.getElementById('modalProductTitle');
            const modalProductImage = document.getElementById('modalProductImage');
            const modalProductDescription = document.getElementById('modalProductDescription');
            const modalProductPrice = document.getElementById('modalProductPrice');
            const modalAddToCart = document.getElementById('modalAddToCart');

            // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
            const formatPrice = (p) => p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';
            
            function showNotification(text) {
                notif.textContent = text;
                notif.classList.add('show');
                setTimeout(() => notif.classList.remove('show'), 2000);
            }

            function findProduct(id) {
                for (let cat in products) {
                    if (cat === 'vape') {
                        for (let sub in products.vape) {
                            const found = products.vape[sub]?.find(p => p.id === id);
                            if (found) return found;
                        }
                    } else {
                        const found = products[cat]?.find(p => p.id === id);
                        if (found) return found;
                    }
                }
                return null;
            }

            // ==================== ЗАГРУЗКА ТОВАРОВ С СЕРВЕРА ====================
            async function loadProducts() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/products`);
                    if (response.ok) {
                        products = await response.json();
                        renderProducts();
                    } else {
                        console.error('Ошибка загрузки товаров');
                        products = {}; // пустой объект
                        renderProducts();
                    }
                } catch (e) {
                    console.error('Не удалось подключиться к серверу:', e);
                    products = {};
                    renderProducts();
                }
            }

            // ==================== ОТРИСОВКА КАТАЛОГА ====================
            function renderProducts() {
                let items = currentCat === 'vape' ? (products.vape?.[currentSub] || []) : (products[currentCat] || []);
                
                if (currentFilter === 'sale') items = items.filter(p => p.discount && p.discount > 0);
                if (currentFilter === 'new') items = items.filter(p => p.isNew);
                if (currentFilter === 'priceAsc') items.sort((a,b) => (a.discount ? a.price*(1-a.discount/100) : a.price) - (b.discount ? b.price*(1-b.discount/100) : b.price));
                if (currentFilter === 'priceDesc') items.sort((a,b) => (b.discount ? b.price*(1-b.discount/100) : b.price) - (a.discount ? a.price*(1-a.discount/100) : a.price));

                if (items.length === 0) {
                    productsGrid.innerHTML = '<div style="grid-column: span 2; text-align:center; color:var(--text-muted); padding:40px;">Товары не найдены</div>';
                    return;
                }

                productsGrid.innerHTML = items.map(p => {
                    const finalPrice = p.discount ? Math.round(p.price * (1 - p.discount/100)) : p.price;
                    const isFav = favorites.some(f => f.id === p.id);
                    return `
                        <div class="product-card" data-id="${p.id}">
                            <div class="product-img">
                                ${p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                                <img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:40px;\\'>📦</div>';">
                            </div>
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div class="product-description">${p.description || ''}</div>
                                <div class="product-price">
                                    ${p.discount ? `<span class="old-price">${formatPrice(p.price)}</span>` : ''}
                                    ${formatPrice(finalPrice)}
                                </div>
                                <div class="product-actions">
                                    <button class="btn-add" data-id="${p.id}">В корзину</button>
                                    <button class="btn-fav" data-id="${p.id}">${isFav ? '❤️' : '🤍'}</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('button')) {
                            const id = card.dataset.id;
                            const product = findProduct(id);
                            if (product) openProductModal(product);
                        }
                    });
                });
                document.querySelectorAll('.btn-add[data-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const p = findProduct(id);
                        if (p) addToCart(p);
                    });
                });
                document.querySelectorAll('.btn-fav[data-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const p = findProduct(id);
                        if (p) {
                            toggleFavorite(p);
                            btn.textContent = favorites.some(f => f.id === id) ? '❤️' : '🤍';
                        }
                    });
                });
            }

            function openProductModal(product) {
                currentProduct = product;
                modalProductTitle.textContent = product.name;
                modalProductImage.src = product.img;
                modalProductDescription.textContent = product.description || 'Описание отсутствует';
                const finalPrice = product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price;
                modalProductPrice.innerHTML = product.discount ? `<span class="old-price">${formatPrice(product.price)}</span> ${formatPrice(finalPrice)}` : formatPrice(finalPrice);
                productModal.classList.add('active');
            }

            modalAddToCart.addEventListener('click', () => {
                if (currentProduct) {
                    addToCart(currentProduct);
                    productModal.classList.remove('active');
                }
            });

            closeProductBtn.addEventListener('click', () => productModal.classList.remove('active'));
            productModal.addEventListener('click', (e) => {
                if (e.target === productModal) productModal.classList.remove('active');
            });

            // ==================== КОРЗИНА ====================
            window.changeQty = function(id, delta) {
                const item = cart.find(i => i.id === id);
                if (item) {
                    item.quantity += delta;
                    if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                    updateCart();
                }
            };

            function addToCart(product, qty = 1) {
                const existing = cart.find(i => i.id === product.id);
                if (existing) {
                    existing.quantity += qty;
                } else {
                    cart.push({ 
                        id: product.id, 
                        name: product.name, 
                        price: product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price, 
                        quantity: qty 
                    });
                }
                updateCart();
                showNotification('✅ Добавлено в корзину');
            }

            function updateCart() {
                localStorage.setItem('bau28_cart', JSON.stringify(cart));
                let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                let promoDiscount = 0;
                if (appliedPromo && appliedPromo.type === 'discount') {
                    if (appliedPromo.discount_type === 'percent') {
                        promoDiscount = Math.round(subtotal * appliedPromo.discount / 100);
                    } else {
                        promoDiscount = appliedPromo.discount;
                    }
                }
                let total = subtotal - promoDiscount - wheelDiscount;
                if (total < 0) total = 0;

                const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
                cartCountSpan.textContent = totalItems;
                cartTotalSpan.textContent = formatPrice(total);
                modalTotalSpan.textContent = formatPrice(total);
                
                if (totalItems > 0) floatingCart.classList.remove('hidden');
                else floatingCart.classList.add('hidden');

                if (promoDiscount > 0 || wheelDiscount > 0) {
                    discountRow.style.display = 'flex';
                    discountAmountSpan.textContent = `-${formatPrice(promoDiscount + wheelDiscount)}`;
                } else {
                    discountRow.style.display = 'none';
                }

                renderCartItems();
            }

            function renderCartItems() {
                if (cart.length === 0) {
                    cartItemsDiv.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Корзина пуста</div>';
                    return;
                }
                cartItemsDiv.innerHTML = cart.map(item => `
                    <div class="cart-item-modern">
                        <div class="cart-item-left">
                            <span class="cart-item-emoji">🛍️</span>
                            <div class="cart-item-info">
                                <span class="cart-item-name">${item.name}</span>
                                <span class="cart-item-price">${formatPrice(item.price)}</span>
                            </div>
                        </div>
                        <div class="cart-item-right">
                            <div class="qty-modern">
                                <button onclick="changeQty('${item.id}', -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQty('${item.id}', 1)">+</button>
                            </div>
                            <button class="remove-item-modern" onclick="removeFromCart('${item.id}')">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            window.removeFromCart = function(id) {
                cart = cart.filter(i => i.id !== id);
                updateCart();
            };

            // ==================== ПРОМОКОДЫ ====================
            applyPromoBtn.addEventListener('click', async () => {
                const code = promoInput.value.trim().toUpperCase();
                if (!code) {
                    promoMessage.textContent = 'Введите код';
                    return;
                }
                promoMessage.textContent = 'Проверка...';
                try {
                    const response = await fetch(`${API_BASE_URL}/api/check_promo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await response.json();
                    if (data.valid) {
                        if (data.type === 'wheel') {
                            wheelActive = true;
                            wheelPromoInput.value = code;
                            promoMessage.textContent = '✅ Промокод активирован! Теперь крутите колесо.';
                            wheelModal.classList.add('active');
                        } else {
                            appliedPromo = { 
                                code, 
                                discount: data.discount, 
                                type: 'discount', 
                                discount_type: data.discount_type 
                            };
                            promoMessage.textContent = `✅ Промокод применён: скидка ${data.discount}${data.discount_type === 'percent' ? '%' : '₽'}`;
                        }
                    } else {
                        appliedPromo = null;
                        promoMessage.textContent = data.error || 'Неверный код';
                    }
                } catch (e) {
                    appliedPromo = null;
                    promoMessage.textContent = 'Ошибка сервера';
                }
                updateCart();
            });

            // ==================== КОЛЕСО ФОРТУНЫ ====================
            wheelBtn.addEventListener('click', () => {
                wheelModal.classList.add('active');
                fetchWheelPrizes();
            });

            closeWheelBtn.addEventListener('click', () => wheelModal.classList.remove('active'));
            wheelModal.addEventListener('click', (e) => {
                if (e.target === wheelModal) wheelModal.classList.remove('active');
            });

            async function fetchWheelPrizes() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/wheel/prizes`);
                    if (response.ok) {
                        wheelPrizes = await response.json();
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить призы колеса');
                }
            }

            spinBtn.addEventListener('click', async () => {
                const code = wheelPromoInput.value.trim().toUpperCase();
                if (!code) {
                    wheelResultDiv.textContent = 'Введите промокод для колеса';
                    return;
                }
                // Проверяем промокод
                try {
                    const resp = await fetch(`${API_BASE_URL}/api/check_promo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await resp.json();
                    if (!data.valid || data.type !== 'wheel') {
                        wheelResultDiv.textContent = 'Неверный промокод для колеса';
                        return;
                    }
                } catch (e) {
                    wheelResultDiv.textContent = 'Ошибка проверки промокода';
                    return;
                }

                if (wheelPrizes.length === 0) {
                    wheelResultDiv.textContent = 'Нет доступных призов';
                    return;
                }

                const rotations = 5 + Math.random() * 3;
                const degrees = rotations * 360 + Math.random() * 360;
                wheel.style.transform = `rotate(${degrees}deg)`;
                
                setTimeout(() => {
                    const totalWeight = wheelPrizes.reduce((s, p) => s + (p.probability || 1), 0);
                    let rand = Math.random() * totalWeight;
                    let selected = null;
                    for (let p of wheelPrizes) {
                        if (rand < (p.probability || 1)) {
                            selected = p;
                            break;
                        }
                        rand -= (p.probability || 1);
                    }
                    if (!selected) selected = wheelPrizes[0];

                    if (selected.type === 'percent') {
                        const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                        wheelDiscount = Math.round(subtotal * selected.value / 100);
                    } else if (selected.type === 'fixed') {
                        wheelDiscount = selected.value;
                    } else {
                        wheelDiscount = 0;
                    }

                    wheelResultDiv.innerHTML = `🎉 Ваш приз: ${selected.description}!`;
                    updateCart();
                }, 3000);
            });

            // ==================== ИЗБРАННОЕ ====================
            function toggleFavorite(product) {
                const index = favorites.findIndex(f => f.id === product.id);
                if (index === -1) {
                    favorites.push(product);
                } else {
                    favorites.splice(index, 1);
                }
                localStorage.setItem('bau28_fav', JSON.stringify(favorites));
                updateFavBadge();
            }

            function updateFavBadge() {
                if (favorites.length > 0) {
                    favBadge.style.display = 'block';
                    favBadge.textContent = favorites.length;
                } else {
                    favBadge.style.display = 'none';
                }
            }

            function renderFavItems() {
                const container = document.getElementById('favItems');
                if (favorites.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Нет избранных</div>';
                    return;
                }
                container.innerHTML = favorites.map(p => {
                    const price = p.discount ? Math.round(p.price * (1 - p.discount/100)) : p.price;
                    return `
                    <div class="cart-item-modern">
                        <div class="cart-item-left">
                            <span class="cart-item-emoji">🛍️</span>
                            <div class="cart-item-info">
                                <span class="cart-item-name">${p.name}</span>
                                <span class="cart-item-price">${formatPrice(price)}</span>
                            </div>
                        </div>
                        <button class="btn-add" style="width:auto; padding:8px 16px;" data-id="${p.id}">В корзину</button>
                    </div>
                `}).join('');
            }

            // ==================== ОТПРАВКА ЗАКАЗА ====================
            orderBtn.addEventListener('click', async () => {
                if (cart.length === 0) return;
                
                const subtotal = cart.reduce((s,i) => s + i.price*i.quantity, 0);
                const promoDiscount = appliedPromo && appliedPromo.type === 'discount' ? 
                    (appliedPromo.discount_type === 'percent' ? Math.round(subtotal * appliedPromo.discount / 100) : appliedPromo.discount) : 0;
                const total = subtotal - promoDiscount - wheelDiscount;

                const orderData = {
                    items: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: item.price
                    })),
                    total: total,
                    promo: appliedPromo ? appliedPromo.code : undefined,
                    wheel_discount: wheelDiscount
                };
                
                const tg = window.Telegram?.WebApp;
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(orderData));
                } else {
                    alert('Тестовый режим. Заказ: ' + JSON.stringify(orderData));
                }
                
                if (API_BASE_URL) {
                    try {
                        await fetch(`${API_BASE_URL}/api/order`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderData)
                        });
                    } catch (error) {
                        console.error('Не удалось отправить заказ на сервер:', error);
                    }
                }
                
                cart = [];
                appliedPromo = null;
                wheelDiscount = 0;
                promoInput.value = '';
                promoMessage.textContent = '';
                updateCart();
                cartModal.classList.remove('active');
                showNotification('🚀 Заказ оформлен!');
            });

            // ==================== МОДАЛКИ ====================
            const setupModal = (btnId, modalId, closeBtnId, renderFn) => {
                const modal = document.getElementById(modalId);
                document.getElementById(btnId).addEventListener('click', () => {
                    if(renderFn) renderFn();
                    modal.classList.add('active');
                });
                document.getElementById(closeBtnId).addEventListener('click', () => modal.classList.remove('active'));
                modal.addEventListener('click', () => modal.classList.remove('active'));
            };

            setupModal('openCartBtn', 'cartModal', 'closeCartBtn', renderCartItems);
            setupModal('topFavBtn', 'favModal', 'closeFavBtn', renderFavItems);

            // ==================== НАВИГАЦИЯ ====================
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = btn.dataset.cat;
                    document.getElementById('vapeSubcats').style.display = currentCat === 'vape' ? 'flex' : 'none';
                    if(currentCat === 'vape') currentSub = 'liquids';
                    renderProducts();
                });
            });

            document.querySelectorAll('.subcat').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.subcat').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.sub) currentSub = btn.dataset.sub;
                    renderProducts();
                });
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.filter) currentFilter = btn.dataset.filter;
                    renderProducts();
                });
            });

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================
            (async () => {
                await loadProducts();
                updateCart();
                updateFavBadge();
            })();

            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.setHeaderColor('#0d0914');
            }
        });
    </script>
</body>
</html>
